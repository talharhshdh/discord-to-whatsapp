name: Discord WhatsApp Bridge

on:
  workflow_dispatch: # Allows manual trigger

jobs:
  run-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Total timeout including wait time (4min run + 5min wait + buffer)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Create auth_info directory
        run: mkdir -p auth_info
      
      - name: Restore creds.json from GitHub Secret
        run: |
          echo '${{ secrets.CREDS_JSON }}' > auth_info/creds.json
          echo "✅ creds.json restored"
      
      - name: Create .env from GitHub Secret
        run: |
          echo '${{ secrets.ENV_FILE }}' > .env
          echo "✅ .env file created"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Run bridge with 4 minute timeout
        run: |
          echo "🚀 Starting Discord WhatsApp Bridge..."
          timeout 240 npm start || code=$?
          if [ $code -eq 124 ]; then
            echo "⏱️ Process killed after 4 minutes (240 seconds) as expected"
          elif [ -z "$code" ]; then
            echo "✅ Process completed normally"
          else
            echo "❌ Process failed with exit code $code"
            exit $code
          fi
      
      - name: Wait 5 minutes before next run
        if: always()
        run: |
          echo "⏳ Waiting 5 minutes before triggering next run..."
          sleep 300
      
      - name: Trigger next workflow run
        if: always()
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/run-bridge.yml/dispatches \
            -d '{"ref":"${{ github.ref_name }}"}'
          echo "✅ Next workflow run triggered"
