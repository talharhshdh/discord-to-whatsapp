name: Discord WhatsApp Bridge

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  run-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 4 # Kill after 4 minutes
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Create auth_info directory
        run: mkdir -p auth_info
      
      - name: Restore creds.json from GitHub Secret
        run: |
          echo '${{ secrets.CREDS_JSON }}' > auth_info/creds.json
          echo "✅ creds.json restored"
      
      - name: Create .env from GitHub Secret
        run: |
          echo '${{ secrets.ENV_FILE }}' > .env
          echo "✅ .env file created"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Run bridge with timeout
        run: |
          echo "🚀 Starting Discord WhatsApp Bridge..."
          timeout 240 npm start || code=$?
          if [ $code -eq 124 ]; then
            echo "⏱️ Process killed after 4 minutes (240 seconds) as expected"
            exit 0
          elif [ -z "$code" ]; then
            echo "✅ Process completed normally"
            exit 0
          else
            echo "❌ Process failed with exit code $code"
            exit $code
          fi
