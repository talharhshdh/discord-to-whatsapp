name: Discord WhatsApp Bridge

on:
  workflow_dispatch: # Allows manual trigger
  schedule:
    - cron: '*/10 * * * *' # Triggers automatically every 10 minutes

jobs:
  run-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # Increased just to ensure it doesn't get forcefully killed during teardown

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Create auth_info directory
        run: mkdir -p auth_info
      
      - name: Restore creds.json from GitHub Secret
        run: |
          echo '${{ secrets.CREDS_JSON }}' > auth_info/creds.json
          echo "✅ creds.json restored"
      
      - name: Create .env from GitHub Secret
        run: |
          echo '${{ secrets.ENV_FILE }}' > .env
          echo "✅ .env file created"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Run bridge with 9-minute timeout
        run: |
          echo "🚀 Starting Discord WhatsApp Bridge..."
          # Runs for 9 minutes (540s), leaving 1 min for the next cron to catch up
          timeout 540 npm start || code=$?
          
          if [ "$code" -eq 124 ]; then
            echo "⏱️ Process gracefully stopped after 9 minutes. Awaiting next cron cycle."
            exit 0 # Exit with 0 so the workflow is marked as 'Success'
          elif [ -z "$code" ]; then
            echo "✅ Process completed normally"
            exit 0
          else
            echo "❌ Process failed with exit code $code"
            exit $code
          fi