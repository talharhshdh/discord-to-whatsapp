name: Discord WhatsApp Bridge

on:
  workflow_dispatch: # Allows manual trigger
  schedule:
    - cron: '*/10 * * * *' # Fallback just in case the loop breaks

concurrency:
  group: discord-whatsapp-bridge
  cancel-in-progress: false # Don't cancel running jobs, just queue them

jobs:
  run-bridge:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Create auth_info directory
        run: mkdir -p auth_info
      
      - name: Restore creds.json from GitHub Secret
        run: |
          echo '${{ secrets.CREDS_JSON }}' > auth_info/creds.json
          echo "✅ creds.json restored"
      
      - name: Create .env from GitHub Secret
        run: |
          echo '${{ secrets.ENV_FILE }}' > .env
          echo "✅ .env file created"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Run bridge for 5 minutes
        run: |
          echo "🚀 Starting Discord WhatsApp Bridge..."
          # Runs the bot for 5 minutes (300 seconds) then gracefully stops
          timeout 300 npm start || code=$?
          
          if [ "$code" -eq 124 ]; then
            echo "⏱️ Process cleanly stopped after 5 minutes."
          elif [ -z "$code" ]; then
            echo "✅ Process completed normally."
          else
            echo "❌ Process failed with exit code $code"
          fi
          exit 0 # Ensures the step passes so the trigger step can run
      
      - name: Trigger next workflow run immediately
        run: |
          echo "🔄 Triggering next run via API..."
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/run-bridge.yml/dispatches \
            -d '{"ref":"${{ github.ref_name }}"}'
          echo "✅ Next workflow run triggered successfully!"